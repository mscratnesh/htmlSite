// ── BUILD CARDS ──
function buildCards() {
  const grid = document.getElementById('cards-grid');
  strategies.forEach(s => {
    // ensure English display for hi-name
    s.hi = s.en;

    // helper to detect Devanagari (Hindi) characters
    const isDevanagari = txt => /[\u0900-\u097F]/.test(String(txt || ''));

    // Outlook: if original outlook is Hindi, fallback to category label
    const outlookText = isDevanagari(s.outlook) ? s.cat : s.outlook;

    // Prepare pros/cons arrays: replace any Hindi entries with simple English fallback
    const prosList = (s.pros || []).map(p => isDevanagari(p) ? 'See strategy details' : p);
    const consList = (s.cons || []).map(c => isDevanagari(c) ? 'See strategy details' : c);

    // Max gain / loss: fallback to generic English if values are in Hindi
    const maxGainText = isDevanagari(s.maxGain) ? 'See strategy details' : s.maxGain;
    const maxLossText = isDevanagari(s.maxLoss) ? 'See strategy details' : s.maxLoss;
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'display:flex;flex-direction:column;align-items:center;';

    const label = document.createElement('div');
    label.className = 'card-label';
    label.textContent = `#${String(s.id).padStart(2,'0')} — ${s.en}`;

    const card = document.createElement('div');
    card.className = `ig-card theme-${s.theme}`;
    card.title = `Click to download — ${s.en}`;
    card.onclick = () => downloadCard(card, s.en.replace(/[^a-z0-9]/gi,'-').toLowerCase());

    card.innerHTML = `<div class="ig-inner">
      <!-- BG -->
      <div class="ig-bg-pattern"></div>
      <div class="ig-grid-lines"></div>
      <!-- Top stripe -->
      <div class="ig-stripe stripe"></div>
      <!-- SVG corner accent -->
      <svg class="ig-corner" viewBox="0 0 200 200"><circle cx="200" cy="0" r="180" fill="white" opacity=".5"/></svg>
      <!-- Category badge -->
      <div class="ig-cat-badge badge-bg accent-color">${s.icon} ${s.cat}</div>
      <!-- P&L Chart -->
      <div class="ig-chart-area">${s.chart}</div>
      <!-- Names (English) -->
      <div class="ig-en-name">${s.en}</div>
      <div class="ig-hi-name">${s.en}</div>
      <!-- Divider -->
      <div class="ig-divider"><div class="ig-divider-dot" style="background:${getDotColor(s.theme)}"></div></div>
      <!-- Outlook -->
      <div class="ig-outlook">
        <div class="ig-outlook-label">Outlook</div>
        <div class="ig-outlook-text">${outlookText}</div>
      </div>
      <!-- Stats -->
      <div class="ig-stats">
        <div class="ig-stat-box">
          <div class="ig-stat-label">📈 Max Gain</div>
          <div class="ig-stat-val">${maxGainText}</div>
        </div>
        <div class="ig-stat-box">
          <div class="ig-stat-label">📉 Max Loss</div>
          <div class="ig-stat-val">${maxLossText}</div>
        </div>
      </div>
      <!-- Pros & Cons -->
      <div class="ig-pc-section">
        <div class="ig-pc-cols">
          <div class="ig-pc-col">
            <div class="ig-pc-head" style="color:#4ade80">Pros</div>
            ${prosList.map(p=>`<div class="ig-pc-item ig-pro-item">${p}</div>`).join('')}
          </div>
          <div class="ig-pc-col">
            <div class="ig-pc-head" style="color:#f87171">Cons</div>
            ${consList.map(c=>`<div class="ig-pc-item ig-con-item">${c}</div>`).join('')}
          </div>
        </div>
      </div>
      <!-- Number watermark -->
      <div class="ig-num">${String(s.id).padStart(2,'0')}</div>
      <!-- Footer -->
      <div class="ig-footer">
        <div class="ig-footer-brand">
          <div class="ig-footer-name">${BRAND.name}</div>
          <div class="ig-footer-phone">📞 ${BRAND.phone}</div>
        </div>
        <div class="ig-footer-right">
          <div class="ig-footer-url">🌐 ${BRAND.url}</div>
          <div class="ig-footer-tag">#OptionsTrading #LetMoneyEarn</div>
        </div>
      </div>
    </div>`;

    wrapper.appendChild(card);
    wrapper.appendChild(label);
    grid.appendChild(wrapper);
  });
}

function getDotColor(theme) {
  const map = {bear:'#ef4444',bull:'#22c55e',neutral:'#60a5fa',income:'#a855f7',hedge:'#14b8a6',danger:'#f97316'};
  return map[theme] || '#f0a500';
}

// ── DOWNLOAD ──
async function downloadCard(cardEl, filename) {
  const inner = cardEl.querySelector('.ig-inner');
  // Temporarily scale to full 1080px for capture
  inner.style.transform = 'scale(1)';
  inner.style.width = '1080px';
  inner.style.height = '1080px';
  cardEl.style.width = '1080px';
  cardEl.style.height = '1080px';

  try {
    const canvas = await html2canvas(inner, {
      width: 1080, height: 1080,
      scale: 1,
      useCORS: true,
      backgroundColor: null,
      logging: false
    });
    const link = document.createElement('a');
    link.download = `options-${filename}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch(e) {
    alert('Download error: ' + (e.message || e));
  }

  // Restore
  inner.style.transform = 'scale(0.3333)';
  inner.style.width = '1080px';
  inner.style.height = '1080px';
  cardEl.style.width = '360px';
  cardEl.style.height = '360px';
}

async function downloadAll() {
  const cards = document.querySelectorAll('.ig-card');
  const slugs = strategies.map(s => s.en.replace(/[^a-z0-9]/gi,'-').toLowerCase());
  for(let i = 0; i < cards.length; i++) {
    await downloadCard(cards[i], slugs[i]);
    await new Promise(r => setTimeout(r, 800));
  }
}

buildCards();
</script>
